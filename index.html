function compressImage(file, maxDim=900, quality=0.6){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error("Lecture impossible"));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error("Image illisible"));
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
        else if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function round2(n){ return Math.round((Number(n)||0) * 100) / 100; }

function moisRestantsExercice(dateAcq){
  const ex = exerciceForDate(dateAcq);
  const { start } = exerciceBounds(ex);
  const [sy, sm] = start.split("-").map(Number);
  const [ay, am] = dateAcq.split("-").map(Number);
  const elapsed = (ay - sy) * 12 + (am - sm);
  return 12 - elapsed;
}

function amortSchedule(asset){
  const base = round2(asset.valeurAchat - (asset.valeurResiduelle || 0));
  const dureeAnnees = Math.max(1, Number(asset.dureeAnnees) || 1);
  const dotationAnnuelle = base / dureeAnnees;
  const moisRest = moisRestantsExercice(asset.dateAcquisition);
  const exerciceDepart = exerciceForDate(asset.dateAcquisition);
  const [y1] = exerciceDepart.split("-").map(Number);

  const rows = [];
  const premiereDotation = round2(dotationAnnuelle * moisRest / 12);
  rows.push({ exercice: exerciceDepart, dotation: premiereDotation });
  let cumul = premiereDotation;

  for(let i=1; i<dureeAnnees; i++){
    const dotation = round2(dotationAnnuelle);
    rows.push({ exercice: `${y1+i}-${y1+i+1}`, dotation });
    cumul = round2(cumul + dotation);
  }
  if(moisRest < 12){
    const reste = round2(base - cumul);
    if(reste > 0.01){
      rows.push({ exercice: `${y1+dureeAnnees}-${y1+dureeAnnees+1}`, dotation: reste });
      cumul = round2(cumul + reste);
    }
  }
  let running = 0;
  return rows.map(r => {
    running = round2(running + r.dotation);
    return { ...r, cumul: running, vnc: round2(asset.valeurAchat - running) };
  });
}

function exportCSV(){
  const rows=[["Numero","Date","Type","Compte","Projet","Libelle","Montant","Moyen de paiement","Notes"]];
  state.entries.slice().sort((a,b)=>a.date>b.date?1:-1).forEach(e=>{
    rows.push([e.numero, fmtDate(e.date), e.type==="recette"?"Recette":"Dépense", e.compte, e.projet||"",
      e.libelle, Number(e.montant).toFixed(2).replace(".",","), e.moyenPaiement||"", (e.notes||"").replace(/\n/g," ")]);
  });
  const csv="\uFEFF"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=`compta-harmonie-${state.settings.nomAsso||"association"}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function parseCSVText(text){
  text = text.replace(/^\uFEFF/, "");
  const rows=[]; let field="", row=[], inQuotes=false, i=0;
  while(i<text.length){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field+='"'; i+=2; continue; }
        inQuotes=false; i++; continue;
      }
      field+=c; i++; continue;
    } else {
      if(c === '"'){ inQuotes=true; i++; continue; }
      if(c === ';' || c === ','){ row.push(field); field=""; i++; continue; }
      if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
      if(c === '\r'){ i++; continue; }
      field+=c; i++; continue;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => !(r.length===1 && r[0].trim()===""));
}

async function handleImportCSV(file){
  const text = await file.text();
  let rows;
  try{ rows = parseCSVText(text); } catch(e){ alert("Erreur pendant la lecture du fichier."); return; }
  if(rows.length < 2){ alert("Ce fichier CSV semble vide."); return; }
  const header = rows[0].map(h=>h.trim().toLowerCase());
  const idx = (name)=> header.indexOf(name);
  const iNum=idx("numero"), iDate=idx("date"), iType=idx("type"), iCompte=idx("compte"),
        iProjet=idx("projet"), iLibelle=idx("libelle"), iMontant=idx("montant"),
        iPaiement=idx("moyen de paiement"), iNotes=idx("notes");
  if(iDate<0 || iType<0 || iMontant<0){ alert("Ce fichier ne ressemble pas à un export de cet outil."); return; }

  const existingNumeros = new Set(state.entries.map(e=>e.numero));
  const toInsert = [];
  let skipped = 0;

  for(let r=1;r<rows.length;r++){
    const row = rows[r];
    const dateRaw = (row[iDate]||"").trim();
    const parts = dateRaw.split("/");
    if(parts.length!==3){ skipped++; continue; }
    const [d,m,y] = parts;
    const dateISO = `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
    const typeRaw = (row[iType]||"").trim().toLowerCase();
    const type = typeRaw.startsWith("rec") ? "recette" : "depense";
    const numeroRaw = (iNum>=0 ? row[iNum] : "") || "";
    const numero = numeroRaw.trim() || nextNumero(type, exerciceForDate(dateISO));
    if(existingNumeros.has(numero)){ skipped++; continue; }
    const compte = (row[iCompte]||"").trim() || (type==="recette" ? "Autres recettes" : "Autres dépenses");
    const projet = (row[iProjet]||"").trim();
    const libelle = (row[iLibelle]||"").trim() || "(sans libellé)";
    const montant = parseFloat((row[iMontant]||"0").trim().replace(",", ".")) || 0;
    const moyenPaiement = (row[iPaiement]||"").trim() || "Espèces";
    const notes = (row[iNotes]||"").trim();
    const exercice = exerciceForDate(dateISO);

    toInsert.push({
      id: crypto.randomUUID(), numero, exercice, type, date: dateISO, libelle, montant,
      compte, projet, moyenPaiement, notes, hasPhoto: false,
    });
    existingNumeros.add(numero);
  }

  if(toInsert.length){
    setLoading(true);
    for(const e of toInsert){ await upsertEntryRemote(e, undefined); }
    toInsert.forEach(e=>{
      if(e.type==="recette" && !state.categories.produits.includes(e.compte)) state.categories.produits.push(e.compte);
      if(e.type==="depense" && !state.categories.charges.includes(e.compte)) state.categories.charges.push(e.compte);
      if(e.projet && !state.projets.includes(e.projet)) state.projets.push(e.projet);
    });
    await saveAppData("categories", state.categories);
    await saveAppData("projets", state.projets);
    if(toInsert.length) logAudit("import", `Import CSV : ${toInsert.length} pièce(s) ajoutée(s)`);
    await loadAll();
  }
  alert(`Import terminé : ${toInsert.length} pièce(s) ajoutée(s), ${skipped} ignorée(s) (déjà présentes ou illisibles).\n\nÀ savoir : les photos jointes aux pièces ne sont pas incluses dans un CSV.`);
}

  document.querySelectorAll(".tab-btn").forEach(btn=>{
    const active = btn.dataset.tab === state.tab;
    btn.style.background = active ? INK : "transparent";
    btn.style.color = active ? "#fff" : "#4B5A75";
    btn.style.border = active ? "none" : `1px solid ${LINE}`;
  });
  const content = document.getElementById("content");
  if(state.tab==="dashboard") content.innerHTML = renderDashboard();
  if(state.tab==="pieces") content.innerHTML = renderPieces();
  if(state.tab==="projets") content.innerHTML = renderProjets();
  if(state.tab==="documents") content.innerHTML = renderDocuments();
  if(state.tab==="amortissements") content.innerHTML = renderAmortissements();
  if(state.tab==="historique") content.innerHTML = renderHistorique();
  if(state.tab==="parametres") content.innerHTML = renderParametres();
  attachContentEvents();
  if(state.tab==="documents") renderDocumentsCharts();
  if(state.tab==="historique") loadAuditLog();
}

const MOIS_LABELS = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];

function monthBounds(yyyymm){
  const [y,m] = yyyymm.split("-").map(Number);
  const start = `${y}-${String(m).padStart(2,"0")}-01`;
  const nextM = m===12 ? 1 : m+1;
  const nextY = m===12 ? y+1 : y;
  const endExclusive = `${nextY}-${String(nextM).padStart(2,"0")}-01`;
  return { start, endExclusive };
}
function exerciceBounds(exercice){
  const [y1,y2] = exercice.split("-").map(Number);
  return { start: `${y1}-09-01`, endExclusive: `${y2}-09-01` };
}
function currentPeriodBounds(){
  return state.docPeriodType === "annuel" ? exerciceBounds(state.docExercice) : monthBounds(state.docMonth);
}
function currentPeriodLabel(){
  if(state.docPeriodType === "annuel") return `Exercice ${state.docExercice}`;
  const [y,m] = state.docMonth.split("-").map(Number);
  return `${MOIS_LABELS[m-1]} ${y}`;
}
function currentPeriodExercice(){
  return state.docPeriodType === "annuel" ? state.docExercice : exerciceForDate(state.docMonth+"-01");
}

function entriesInRange(start, endExclusive){
  return state.entries.filter(e => e.date >= start && e.date < endExclusive);
}

function computeCompteResultat(){
  const { start, endExclusive } = currentPeriodBounds();
  const es = entriesInRange(start, endExclusive);
  const groupBy = (type)=>{
    const map = {};
    es.filter(e=>e.type===type).forEach(e=>{ map[e.compte] = (map[e.compte]||0) + Number(e.montant); });
    return Object.entries(map).map(([compte,total])=>({compte,total})).sort((a,b)=>b.total-a.total);
  };
  const produits = groupBy("recette");
  const charges = groupBy("depense");
  const totalProduits = produits.reduce((s,x)=>s+x.total,0);
  const totalCharges = charges.reduce((s,x)=>s+x.total,0);
  return { produits, charges, totalProduits, totalCharges, resultat: totalProduits - totalCharges };
}

function computeBilan(){
  const { start, endExclusive } = currentPeriodBounds();
  const avant = state.entries.filter(e => e.date < start);
  const rAvant = avant.filter(e=>e.type==="recette").reduce((s,e)=>s+Number(e.montant),0);
  const dAvant = avant.filter(e=>e.type==="depense").reduce((s,e)=>s+Number(e.montant),0);
  const soldeDebut = Number(state.settings.soldeInitial||0) + rAvant - dAvant;
  const es = entriesInRange(start, endExclusive);
  const totalR = es.filter(e=>e.type==="recette").reduce((s,e)=>s+Number(e.montant),0);
  const totalD = es.filter(e=>e.type==="depense").reduce((s,e)=>s+Number(e.montant),0);
  return { soldeDebut, totalR, totalD, soldeFin: soldeDebut + totalR - totalD };
}

function destroyCharts(){
  Object.values(chartInstances).forEach(c=>{ try{ c.destroy(); }catch(e){} });
  chartInstances = {};
}

function renderDocumentsCharts(){
  destroyCharts();
  const ex = currentPeriodExercice();
  const { start: exStart } = exerciceBounds(ex);
  const monthLabelsOrdered = [];
  const monthKeys = [];
  let [sy, sm] = exStart.split("-").map(Number);
  for(let i=0;i<12;i++){
    monthKeys.push(`${sy}-${String(sm).padStart(2,"0")}`);
    monthLabelsOrdered.push(MOIS_LABELS[sm-1].slice(0,3));
    sm++; if(sm>12){ sm=1; sy++; }
  }
  const recettesParMois = monthKeys.map(k => state.entries.filter(e=>e.type==="recette" && e.date.slice(0,7)===k).reduce((s,e)=>s+Number(e.montant),0));
  const depensesParMois = monthKeys.map(k => state.entries.filter(e=>e.type==="depense" && e.date.slice(0,7)===k).reduce((s,e)=>s+Number(e.montant),0));

  const elEvo = document.getElementById("chartEvolution");
  if(elEvo){
    chartInstances.chartEvolution = new Chart(elEvo, {
      type: "bar",
      data: { labels: monthLabelsOrdered, datasets: [
        { label: "Recettes", data: recettesParMois, backgroundColor: GOLD },
        { label: "Dépenses", data: depensesParMois, backgroundColor: BRICK },
      ]},
      options: { responsive:true, plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, font:{size:10} } } }, scales:{ y:{ ticks:{ font:{size:9} } }, x:{ ticks:{ font:{size:9} } } } }
    });
  }

  const sorted = state.entries.slice().sort((a,b)=> a.date<b.date?-1:1);
  let running = Number(state.settings.soldeInitial||0);
  const soldeLabels = [], soldeData = [];
  sorted.forEach(e=>{
    running += e.type==="recette" ? Number(e.montant) : -Number(e.montant);
    soldeLabels.push(fmtDate(e.date));
    soldeData.push(running);
  });
  const elSolde = document.getElementById("chartSolde");
  if(elSolde){
    chartInstances.chartSolde = new Chart(elSolde, {
      type: "line",
      data: { labels: soldeLabels, datasets: [{ label:"Solde", data: soldeData, borderColor: INK, backgroundColor: "rgba(36,49,74,0.08)", fill:true, tension:0.15, pointRadius:0 }]},
      options: { responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ display: soldeLabels.length<15, ticks:{ font:{size:8} } }, y:{ ticks:{ font:{size:9} } } } }
    });
  }

  const cr = computeCompteResultat();
  const palette = ["#24314A","#A9791F","#9C3E33","#5C7A6B","#7A5C8A","#B5895A","#4A7A9C","#8A5C5C"];
  const elDep = document.getElementById("chartDepenses");
  if(elDep){
    chartInstances.chartDepenses = new Chart(elDep, {
      type: "doughnut",
      data: { labels: cr.charges.map(x=>x.compte), datasets: [{ data: cr.charges.map(x=>x.total), backgroundColor: palette }]},
      options: { responsive:true, plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, font:{size:9} } } } }
    });
  }
  const elRec = document.getElementById("chartRecettes");
  if(elRec){
    chartInstances.chartRecettes = new Chart(elRec, {
      type: "doughnut",
      data: { labels: cr.produits.map(x=>x.compte), datasets: [{ data: cr.produits.map(x=>x.total), backgroundColor: palette }]},
      options: { responsive:true, plugins:{ legend:{ position:"bottom", labels:{ boxWidth:10, font:{size:9} } } } }
    });
  }

  document.querySelectorAll("[data-chart-download]").forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.chartDownload;
      const chart = chartInstances[id];
      if(!chart) return;
      const a = document.createElement("a");
      a.href = chart.toBase64Image();
      a.download = `${id}-${state.docPeriodType==='annuel'?state.docExercice:state.docMonth}.png`;
      a.click();
    };
  });
}

    if(loading){ zone.innerHTML = `<p class="text-xs text-slate-500">Chargement de la photo...</p>`; return; }
    if(photoData){
      zone.innerHTML = `<div class="relative inline-block"><img src="${photoData}" class="rounded-lg max-h-40"><button type="button" id="removePhotoBtn" class="absolute -top-2 -right-2 rounded-full p-1 text-white" style="background:${BRICK}">✕</button></div>`;
      document.getElementById("removePhotoBtn").onclick = ()=>{ photoData=null; photoRemoved=true; paintPhotoZone(); };
    } else {
      zone.innerHTML = `<button type="button" id="addPhotoBtn" class="w-full flex items-center justify-center gap-2 rounded-lg py-4 text-sm font-medium" style="border:1.5px dashed ${LINE};color:#4B5A75">📷 Ajouter une photo</button>`;
      document.getElementById("addPhotoBtn").onclick = ()=> document.getElementById("fPhotoInput").click();
    }
  }

  paintTypeButtons(); fillCompteOptions();
  document.getElementById("fCompteSel").onchange = updateAmortZone;

  if(editingEntry?.hasPhoto){
    paintPhotoZone(true);
    fetchPhoto(editingEntry.id).then(p=>{ photoData = p; paintPhotoZone(); });
  } else {
    paintPhotoZone();
  }

  document.querySelectorAll(".typeBtn").forEach(btn=>{
    btn.onclick = ()=>{ currentType=btn.dataset.type; paintTypeButtons(); fillCompteOptions(); };
  });

  document.getElementById("fPhotoInput").onchange = async (e)=>{
    const file = e.target.files?.[0];
    if(!file) return;
    try{
      photoData = await compressImage(file);
      photoRemoved = false;
      paintPhotoZone();
    }catch(err){ alert("Impossible de lire cette image."); }
  };

  document.getElementById("closeForm").onclick = closeModal;
  document.getElementById("cancelForm").onclick = closeModal;
  document.getElementById("formOverlay").onclick = (e)=>{ if(e.target.id==="formOverlay") closeModal(); };

  document.getElementById("entryForm").onsubmit = async (e)=>{
    e.preventDefault();
    const libelle = document.getElementById("fLibelle").value.trim();
    const montant = document.getElementById("fMontant").value;
    const compte = document.getElementById("fCompteSel").value;
    if(!libelle || !montant || !compte) return;
    const submitBtn = document.getElementById("submitForm");
    submitBtn.disabled = true; submitBtn.textContent = "Enregistrement...";
    const exercice = editingEntry?.exercice || currentExercice();
    const entry = {
      id: editingEntry?.id || crypto.randomUUID(),
      numero: editingEntry?.numero || nextNumero(currentType, exercice),
      exercice, type: currentType,
      date: document.getElementById("fDate").value,
      libelle, montant: Number(montant), compte,
      projet: document.getElementById("fProjetSel").value || "",
      moyenPaiement: document.getElementById("fPaiement").value,
      notes: document.getElementById("fNotes").value.trim(),
      hasPhoto: !photoRemoved && !!photoData,
    };
    const photoValue = photoRemoved ? null : (photoData !== undefined ? photoData : undefined);
    const amortToggleEl = document.getElementById("amortToggle");
    const wantsAmort = !isEdit && amortToggleEl && amortToggleEl.checked;
    const amortDuree = wantsAmort ? Number(document.getElementById("amortDuree").value) || 5 : null;
    const amortResiduelle = wantsAmort ? (Number(document.getElementById("amortResiduelle").value) || 0) : null;

    const ok = await upsertEntryRemote(entry, photoValue);
    if(!ok) showWarning("Erreur lors de l'enregistrement — réessaie.");
    else logAudit(isEdit ? "update" : "create", `${isEdit ? "Modification" : "Ajout"} de la pièce ${entry.numero} — ${entry.libelle} (${fmtMontant(entry.montant)})`);

    if(ok && wantsAmort){
      const immoItem = {
        id: crypto.randomUUID(), designation: entry.libelle, dateAcquisition: entry.date,
        valeurAchat: entry.montant, valeurResiduelle: amortResiduelle, dureeAnnees: amortDuree,
        notes: `Créée automatiquement depuis la pièce ${entry.numero}`,
      };
      const immoOk = await upsertImmoRemote(immoItem);
      if(!immoOk) showWarning("La pièce a été enregistrée, mais l'immobilisation n'a pas pu être créée.");
      else logAudit("create", `Création automatique de l'immobilisation ${immoItem.designation} depuis la pièce ${entry.numero}`);
    }

    closeModal();
    await loadAll();
  };
}

function openDetail(entry){

    <div class="w-full md:max-w-md max-h-[92vh] overflow-y-auto rounded-t-2xl md:rounded-2xl p-5" style="background:#EEF0E4">
      <div class="flex items-start justify-between mb-4">
        <div>${stampHtml(entry.numero)}<div class="mt-2">${badgeHtml(entry.type)}</div></div>
        <button id="closeDetail" class="text-slate-500 text-xl">✕</button>
      </div>
      <h3 class="text-lg font-bold mb-1" style="color:${INK}">${esc(entry.libelle)}</h3>
      <p class="text-2xl font-semibold mb-4 mono" style="color:${entry.type==='recette'?GOLD:BRICK}">${fmtMontant(entry.montant)}</p>
      <dl class="text-sm space-y-2 mb-4">
        <div class="flex justify-between"><dt class="text-slate-500">Date</dt><dd style="color:${INK}">${fmtDate(entry.date)}</dd></div>
        <div class="flex justify-between"><dt class="text-slate-500">Compte</dt><dd style="color:${INK}">${esc(entry.compte)}</dd></div>
        ${entry.projet ? `<div class="flex justify-between"><dt class="text-slate-500">Projet</dt><dd style="color:${INK}">${esc(entry.projet)}</dd></div>`:""}
        <div class="flex justify-between"><dt class="text-slate-500">Paiement</dt><dd style="color:${INK}">${esc(entry.moyenPaiement)}</dd></div>
        <div class="flex justify-between"><dt class="text-slate-500">Année</dt><dd style="color:${INK}">${esc(entry.exercice)}</dd></div>
        ${entry.createdBy ? `<div class="flex justify-between"><dt class="text-slate-500">Ajouté par</dt><dd style="color:${INK}">${esc(entry.createdBy)}</dd></div>`:""}
        ${entry.notes ? `<div><dt class="text-slate-500 mb-1">Notes</dt><dd style="color:${INK}">${esc(entry.notes)}</dd></div>`:""}
      </dl>
      <div id="detailPhotoZone" class="mb-4"></div>
      <div class="flex gap-2">
        <button id="editEntryBtn" class="flex-1 rounded-lg py-2.5 text-sm font-semibold" style="border:1px solid ${LINE};color:${INK}">✎ Modifier</button>
        <button id="deleteEntryBtn" class="flex-1 rounded-lg py-2.5 text-sm font-semibold" style="border:1px solid ${BRICK};color:${BRICK}">🗑 Supprimer</button>
      </div>
    </div>
  </div>`;
  if(entry.hasPhoto){
    document.getElementById("detailPhotoZone").innerHTML = `<p class="text-xs text-slate-500">Chargement de la photo...</p>`;
    fetchPhoto(entry.id).then(p=>{
      const zone = document.getElementById("detailPhotoZone");
      if(zone) zone.innerHTML = p ? `<img src="${p}" class="w-full rounded-lg">` : "";
    });
  }
  document.getElementById("closeDetail").onclick = closeModal;
  document.getElementById("detailOverlay").onclick = (e)=>{ if(e.target.id==="detailOverlay") closeModal(); };
  document.getElementById("editEntryBtn").onclick = ()=>{ closeModal(); openForm(entry); };
  document.getElementById("deleteEntryBtn").onclick = async (e)=>{
    if(e.target.dataset.confirmed){
      const ok = await deleteEntryRemote(entry.id);
      if(!ok) showWarning("Erreur lors de la suppression.");
      else logAudit("delete", `Suppression de la pièce ${entry.numero} — ${entry.libelle} (${fmtMontant(entry.montant)})`);
      closeModal(); await loadAll();
    } else {
      e.target.textContent = "Confirmer la suppression";
      e.target.style.background = BRICK; e.target.style.color = "#fff";
      e.target.dataset.confirmed = "1";
    }
  };
}

function closeModal(){ document.getElementById("modalRoot").innerHTML = ""; }

function openImmoForm(editingImmo){
  const isEdit = !!editingImmo;
  document.getElementById("modalRoot").innerHTML = `
  <div class="fixed inset-0 z-40 flex items-end md:items-center justify-center modal-bg" id="immoOverlay">
    <form id="immoForm" class="w-full md:max-w-md max-h-[92vh] overflow-y-auto rounded-t-2xl md:rounded-2xl p-5" style="background:#EEF0E4">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-bold" style="color:${INK}">${isEdit?"Modifier l'immobilisation":"Nouvelle immobilisation"}</h3>
        <button type="button" id="closeImmoForm" class="text-slate-500 text-xl">✕</button>
      </div>
      <label class="block text-xs mb-1 text-slate-500">Désignation</label>
      <input required id="immoDesignation" value="${esc(editingImmo?.designation||'')}" placeholder="Ex : Trompette Yamaha YTR-2330" class="w-full px-3 py-2 text-sm rounded-md mb-3" style="border:1px solid ${LINE};background:#fff">
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><label class="block text-xs mb-1 text-slate-500">Date d'acquisition</label>
          <input required id="immoDate" type="date" value="${editingImmo?.dateAcquisition || new Date().toISOString().slice(0,10)}" class="w-full px-3 py-2 text-sm rounded-md" style="border:1px solid ${LINE};background:#fff"></div>
        <div><label class="block text-xs mb-1 text-slate-500">Durée (années)</label>
          <input required id="immoDuree" type="number" min="1" step="1" value="${editingImmo?.dureeAnnees ?? 5}" class="w-full px-3 py-2 text-sm rounded-md" style="border:1px solid ${LINE};background:#fff"></div>
      </div>
      <div class="grid grid-cols-2 gap-3 mb-3">
        <div><label class="block text-xs mb-1 text-slate-500">Valeur d'achat (€)</label>
          <input required id="immoValeur" type="number" min="0" step="0.01" value="${editingImmo?.valeurAchat ?? ''}" class="w-full px-3 py-2 text-sm rounded-md" style="border:1px solid ${LINE};background:#fff"></div>
        <div><label class="block text-xs mb-1 text-slate-500">Valeur résiduelle (€)</label>
          <input id="immoResiduelle" type="number" min="0" step="0.01" value="${editingImmo?.valeurResiduelle ?? 0}" class="w-full px-3 py-2 text-sm rounded-md" style="border:1px solid ${LINE};background:#fff"></div>
      </div>
      <label class="block text-xs mb-1 text-slate-500">Notes (optionnel)</label>
      <textarea id="immoNotes" rows="2" class="w-full px-3 py-2 text-sm rounded-md mb-3" style="border:1px solid ${LINE};background:#fff">${esc(editingImmo?.notes||'')}</textarea>
      <p class="text-xs text-slate-500 mb-3">L'amortissement est calculé de façon linéaire, au prorata du temps sur l'exercice d'acquisition.</p>
      <div class="flex gap-2 mt-2">
        <button type="button" id="cancelImmoForm" class="flex-1 rounded-lg py-2.5 text-sm font-semibold" style="border:1px solid ${LINE};color:${INK}">Annuler</button>
        <button type="submit" id="submitImmoForm" class="flex-1 rounded-lg py-2.5 text-sm font-semibold text-white" style="background:${INK}">${isEdit?"Enregistrer":"Ajouter"}</button>

    </form>
  </div>`;

  document.getElementById("closeImmoForm").onclick = closeModal;
  document.getElementById("cancelImmoForm").onclick = closeModal;
  document.getElementById("immoOverlay").onclick = (e)=>{ if(e.target.id==="immoOverlay") closeModal(); };

  document.getElementById("immoForm").onsubmit = async (e)=>{
    e.preventDefault();
    const designation = document.getElementById("immoDesignation").value.trim();
    const dateAcquisition = document.getElementById("immoDate").value;
    const dureeAnnees = Number(document.getElementById("immoDuree").value);
    const valeurAchat = Number(document.getElementById("immoValeur").value);
    const valeurResiduelle = Number(document.getElementById("immoResiduelle").value) || 0;

    if(!designation || !dateAcquisition || !dureeAnnees || !valeurAchat) return;

    if(state.tab==="historique"){ render(); loadAuditLog(); }
    else render();
  };
});
document.getElementById("fabNew").onclick = ()=> openForm(null);

function attachContentEvents(){
  document.querySelectorAll("[data-open]").forEach(el=>{
    el.onclick = ()=>{
      const entry = state.entries.find(x=>x.id===el.dataset.open);
      if(entry) openDetail(entry);
    };
  });

  const dashEx = document.getElementById("dashExercice");
  if(dashEx) dashEx.onchange = ()=>{ state.filters.exercice = dashEx.value; render(); };

  const fSearch = document.getElementById("fSearch");
  if(fSearch) fSearch.oninput = ()=>{ state.filters.search = fSearch.value; render(); focusSearch(); };
  const fType = document.getElementById("fType");
  if(fType) fType.onchange = ()=>{ state.filters.type = fType.value; render(); };
  const fCompte = document.getElementById("fCompte");
  if(fCompte) fCompte.onchange = ()=>{ state.filters.compte = fCompte.value; render(); };
  const fProjet = document.getElementById("fProjet");
  if(fProjet) fProjet.onchange = ()=>{ state.filters.projet = fProjet.value; render(); };
  const fExercice = document.getElementById("fExercice");
  if(fExercice) fExercice.onchange = ()=>{ state.filters.exercice = fExercice.value; render(); };
  const exportBtn = document.getElementById("exportBtn");
  if(exportBtn) exportBtn.onclick = exportCSV;
  const exportBtn2 = document.getElementById("exportBtn2");
  if(exportBtn2) exportBtn2.onclick = exportCSV;

  const importBtn = document.getElementById("importBtn");
  const importInput = document.getElementById("importInput");
  if(importBtn && importInput){
    importBtn.onclick = ()=> importInput.click();
    importInput.onchange = (e)=>{
      const file = e.target.files?.[0];
      if(file) handleImportCSV(file);
      importInput.value = "";
    };
  }

  const addProjetBtn = document.getElementById("addProjetBtn");
  if(addProjetBtn) addProjetBtn.onclick = async ()=>{
    const input = document.getElementById("newProjetInput");
    const val = input.value.trim();
    if(val){ state.projets = [...state.projets, val]; await saveAppData("projets", state.projets); render(); }
  };
  document.querySelectorAll("[data-projet-toggle]").forEach(el=>{
    el.onclick = ()=>{ const p = el.dataset.projetToggle; state.openProjet = state.openProjet===p ? null : p; render(); };
  });
  document.querySelectorAll("[data-projet-remove]").forEach(el=>{
    el.onclick = async ()=>{ state.projets = state.projets.filter(p=>p!==el.dataset.projetRemove); await saveAppData("projets", state.projets); state.openProjet=null; render(); };
  });

  const saveSettingsBtn = document.getElementById("saveSettingsBtn");
  if(saveSettingsBtn) saveSettingsBtn.onclick = async ()=>{
    state.settings.nomAsso = document.getElementById("setNomAsso").value.trim();
    state.settings.soldeInitial = Number(document.getElementById("setSolde").value) || 0;
    await saveAppData("settings", state.settings);
    render();
  };
  document.querySelectorAll("[data-rm-produit]").forEach(el=>{
    el.onclick = async ()=>{ state.categories.produits = state.categories.produits.filter(x=>x!==el.dataset.rmProduit); await saveAppData("categories", state.categories); render(); };
  });
  document.querySelectorAll("[data-rm-charge]").forEach(el=>{
    el.onclick = async ()=>{ state.categories.charges = state.categories.charges.filter(x=>x!==el.dataset.rmCharge); await saveAppData("categories", state.categories); render(); };
  });
  const addProduitBtn = document.getElementById("addProduitBtn");
  if(addProduitBtn) addProduitBtn.onclick = async ()=>{
    const input = document.getElementById("newProduit");
    if(input.value.trim()){ state.categories.produits = [...state.categories.produits, input.value.trim()]; await saveAppData("categories", state.categories); render(); }
  };
  const addChargeBtn = document.getElementById("addChargeBtn");
  if(addChargeBtn) addChargeBtn.onclick = async ()=>{
    const input = document.getElementById("newCharge");
    if(input.value.trim()){ state.categories.charges = [...state.categories.charges, input.value.trim()]; await saveAppData("categories", state.categories); render(); }
  };
  document.querySelectorAll("[data-toggle-amort]").forEach(el=>{
    el.onchange = async ()=>{
      const name = el.dataset.toggleAmort;
      if(el.checked){ if(!state.comptesAmortissables.includes(name)) state.comptesAmortissables.push(name); }
      else { state.comptesAmortissables = state.comptesAmortissables.filter(x=>x!==name); }
      await saveAppData("comptesAmortissables", state.comptesAmortissables);
      render();
    };
  });

  document.querySelectorAll(".docPeriodBtn").forEach(btn=>{
    const active = btn.dataset.docperiod === state.docPeriodType;
    btn.style.background = active ? INK : "#fff";
    btn.style.color = active ? "#fff" : "#4B5A75";
    btn.style.border = `1px solid ${active?INK:LINE}`;
    btn.onclick = ()=>{ state.docPeriodType = btn.dataset.docperiod; render(); };
  });
  const docExerciceSel = document.getElementById("docExerciceSel");
  if(docExerciceSel) docExerciceSel.onchange = ()=>{ state.docExercice = docExerciceSel.value; render(); };
  const docMonthInput = document.getElementById("docMonthInput");
  if(docMonthInput) docMonthInput.onchange = ()=>{ if(docMonthInput.value){ state.docMonth = docMonthInput.value; render(); } };
  const exportPdfBtn = document.getElementById("exportPdfBtn");
  if(exportPdfBtn) exportPdfBtn.onclick = exportDocumentsPDF;

  const newImmoBtn = document.getElementById("newImmoBtn");
  if(newImmoBtn) newImmoBtn.onclick = ()=> openImmoForm(null);
  const amortExerciceSel = document.getElementById("amortExerciceSel");
  if(amortExerciceSel) amortExerciceSel.onchange = ()=>{ state.amortExercice = amortExerciceSel.value; render(); };
  document.querySelectorAll("[data-immo-toggle]").forEach(el=>{
    el.onclick = ()=>{ state.amortOpenId = state.amortOpenId===el.dataset.immoToggle ? null : el.dataset.immoToggle; render(); };
  });
  document.querySelectorAll("[data-immo-edit]").forEach(el=>{
    el.onclick = (e)=>{ e.stopPropagation(); const item = state.immobilisations.find(a=>a.id===el.dataset.immoEdit); if(item) openImmoForm(item); };
  });
  document.querySelectorAll("[data-immo-remove]").forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      if(el.dataset.confirmed){
        const item = state.immobilisations.find(a=>a.id===el.dataset.immoRemove);
        const ok = await deleteImmoRemote(el.dataset.immoRemove);
        if(!ok) showWarning("Erreur lors de la suppression.");
        else if(item) logAudit("delete", `Suppression de l'immobilisation ${item.designation}`);
        state.amortOpenId = null;
        await loadAll();
      } else {
        el.textContent = "Confirmer ?";
        el.style.fontWeight = "bold";
        el.dataset.confirmed = "1";
      }
    };
  });
}
function focusSearch(){
  const el = document.getElementById("fSearch");
  if(el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

let realtimeChannel = null;

function showAuthScreen(){
  document.getElementById("authScreen").classList.remove("hidden");
  document.getElementById("appRoot").classList.add("hidden");
  if(realtimeChannel){ db.removeChannel(realtimeChannel); realtimeChannel = null; }
}

async function onLoggedIn(session){
  currentUserEmail = session.user.email;
  document.getElementById("authScreen").classList.add("hidden");
  document.getElementById("appRoot").classList.remove("hidden");
  document.getElementById("userEmail").textContent = currentUserEmail;
  await loadAll();
  setupRealtime();
}

function setupRealtime(){
  if(realtimeChannel) db.removeChannel(realtimeChannel);
  realtimeChannel = db.channel("compta-sync")
    .on("postgres_changes", { event: "*", schema: "public", table: "entries" }, ()=>{ loadAll(); })
    .on("postgres_changes", { event: "*", schema: "public", table: "app_data" }, ()=>{ loadAll(); })
    .on("postgres_changes", { event: "*", schema: "public", table: "immobilisations" }, ()=>{ loadAll(); })
    .subscribe();
}

document.getElementById("loginForm").onsubmit = async (e)=>{
  e.preventDefault();
  const submitBtn = document.getElementById("loginSubmit");
  const errEl = document.getElementById("loginError");
  errEl.classList.add("hidden");
  submitBtn.disabled = true; submitBtn.textContent = "Connexion...";
  setRemember(document.getElementById("rememberMe").checked);
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const { error } = await db.auth.signInWithPassword({ email, password });
  submitBtn.disabled = false; submitBtn.textContent = "Se connecter";
  if(error){
    errEl.textContent = "Connexion impossible : email ou mot de passe incorrect.";
    errEl.classList.remove("hidden");
  }
};

document.getElementById("logoutBtn").onclick = async ()=>{
  await db.auth.signOut();
};

db.auth.onAuthStateChange((event, session)=>{
  if(event === "SIGNED_IN" && session) onLoggedIn(session);
  if(event === "SIGNED_OUT") showAuthScreen();
});

(async function init(){
  const { data: { session } } = await db.auth.getSession();
  if(session) onLoggedIn(session); else showAuthScreen();
})();
</script>
